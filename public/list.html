<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách user | Lập trình web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="browser-top">
            <div class="browser-titlebar">
                <div class="browser-tab">Lập trình web</div>
                <div class="browser-controls">
                    <span class="browser-dot"></span>
                    <span class="browser-dot"></span>
                    <span class="browser-dot is-active"></span>
                </div>
            </div>
            <div class="browser-toolbar">
                <div class="toolbar-actions" aria-hidden="true">
                    <span>&larr;</span>
                    <span>&rarr;</span>
                    <span>&#8635;</span>
                </div>
                <div class="address-bar">
                    <span class="address-icon" aria-hidden="true"></span>
                    <span>http://php.local</span>
                </div>
            </div>
        </header>

        <section class="content">
            <nav class="top-nav">
                <a href="index.html">Home</a> | <strong>Đăng xuất</strong>
            </nav>

            <div class="page-body">
                <section class="page-panel wide">
                    <h1 class="page-title">Danh sách user</h1>

                    <div class="data-table-wrap">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody data-user-table></tbody>
                        </table>
                    </div>

                    <div class="pagination" data-pagination></div>
                </section>
            </div>

            <footer class="footer-bar">Lập trình web @01/2024</footer>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
