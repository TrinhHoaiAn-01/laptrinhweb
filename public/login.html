<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Lập trình web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="browser-top">
            <div class="browser-titlebar">
                <div class="browser-tab">Lập trình web</div>
                <div class="browser-controls">
                    <span class="browser-dot"></span>
                    <span class="browser-dot"></span>
                    <span class="browser-dot is-active"></span>
                </div>
            </div>
            <div class="browser-toolbar">
                <div class="toolbar-actions" aria-hidden="true">
                    <span>&larr;</span>
                    <span>&rarr;</span>
                    <span>&#8635;</span>
                </div>
                <div class="address-bar">
                    <span class="address-icon" aria-hidden="true"></span>
                    <span>http://php.local</span>
                </div>
            </div>
        </header>

        <section class="content">
            <nav class="top-nav">
                <a href="index.html">Home</a> | <strong>Đăng nhập</strong> | <a href="register.html">Đăng ký</a>
            </nav>

            <div class="page-body">
                <section class="page-panel">
                    <h1 class="page-title">Màn hình đăng nhập</h1>

                    <form data-form-type="login">
                        <div class="form-grid">
                            <label for="login-username">Username</label>
                            <input class="text-input" id="login-username" name="username" type="text" placeholder="Nhập username">

                            <label for="login-password">Mật khẩu</label>
                            <input class="text-input" id="login-password" name="password" type="password" placeholder="Nhập mật khẩu">

                            <label class="checkbox-row">
                                <input type="checkbox" name="remember" checked>
                                <span>Ghi nhớ đăng nhập</span>
                            </label>
                        </div>

                        <div class="form-actions">
                            <a class="button-secondary" href="register.html">Quên mật khẩu</a>
                            <button class="button" type="submit">Đăng nhập</button>
                        </div>

                        <div class="form-message" aria-live="polite"></div>
                    </form>
                </section>
            </div>

            <footer class="footer-bar">Lập trình web @01/2024</footer>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
