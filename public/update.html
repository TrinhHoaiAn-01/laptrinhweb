<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật | Lập trình web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="browser-top">
            <div class="browser-titlebar">
                <div class="browser-tab">Lập trình web</div>
                <div class="browser-controls">
                    <span class="browser-dot"></span>
                    <span class="browser-dot"></span>
                    <span class="browser-dot is-active"></span>
                </div>
            </div>
            <div class="browser-toolbar">
                <div class="toolbar-actions" aria-hidden="true">
                    <span>&larr;</span>
                    <span>&rarr;</span>
                    <span>&#8635;</span>
                </div>
                <div class="address-bar">
                    <span class="address-icon" aria-hidden="true"></span>
                    <span>http://php.local</span>
                </div>
            </div>
        </header>

        <section class="content">
            <nav class="top-nav">
                <a href="index.html">Home</a> | <a href="list.html">Danh sách user</a> | <strong>Cập nhật</strong>
            </nav>

            <div class="page-body">
                <section class="page-panel">
                    <h1 class="page-title">Màn hình cập nhật</h1>

                    <form data-form-type="update" data-prefill-form>
                        <div class="form-grid">
                            <label for="update-username">Username</label>
                            <input class="text-input" id="update-username" name="username" type="text">

                            <label for="update-password">Mật khẩu</label>
                            <input class="text-input" id="update-password" name="password" type="password">

                            <label for="update-confirm">Nhập lại mật khẩu</label>
                            <input class="text-input" id="update-confirm" name="confirm_password" type="password">

                            <label for="update-email">Email</label>
                            <input class="text-input" id="update-email" name="email" type="email">
                        </div>

                        <div class="form-actions">
                            <a class="button-secondary" href="list.html">Quay lại danh sách</a>
                            <button class="button" type="submit">Cập nhật</button>
                        </div>

                        <div class="form-message" aria-live="polite"></div>
                    </form>
                </section>
            </div>

            <footer class="footer-bar">Lập trình web @01/2024</footer>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
